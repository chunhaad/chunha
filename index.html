    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FFD400;
            --primary-light: #FFC107;
            --secondary: #111111;
            --secondary-light: #1a1a1a;
            --accent: #FFD400;
            --text-light: #ffffff;
            --text-dark: #111111;
            --border: #e2e8f0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Noto Sans KR', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: #fff;
            overflow-x: hidden;
        }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(50px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(255, 212, 0, 0.3); }
            50% { box-shadow: 0 0 30px rgba(255, 212, 0, 0.6); }
        }

        @keyframes yellowGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 212, 0, 0.3), 0 0 40px rgba(255, 212, 0, 0.1); }
            50% { text-shadow: 0 0 30px rgba(255, 212, 0, 0.6), 0 0 60px rgba(255, 212, 0, 0.3); }
        }

        @keyframes shimmerLine {
            0% { background-position: -1000px 0; }
            100% { background-position: 1000px 0; }
        }

        @keyframes rotateShape {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        @keyframes floatShape1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(20px, -30px) rotate(90deg); }
            50% { transform: translate(0, -60px) rotate(180deg); }
            75% { transform: translate(-20px, -30px) rotate(270deg); }
        }

        @keyframes floatShape2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(-30px, 20px) rotate(-90deg); }
            50% { transform: translate(-60px, 0) rotate(-180deg); }
            75% { transform: translate(-30px, -20px) rotate(-270deg); }
        }

        @keyframes slideInDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ===== HEADER ===== */
        header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: white;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: slideInDown 0.6s ease-out;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 212, 0, 0.2);
        }

        nav {
            display: flex;
            gap: 35px;
            align-items: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        /* ===== HERO SECTION ===== */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            overflow: hidden;
            margin-top: 60px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #111111 0%, #1a1a1a 25%, #0d0d0d 50%, #1a1a1a 75%, #111111 100%);
            z-index: 0;
        }

        .hero::after {
            content: '';
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 212, 0, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 30%, rgba(255, 193, 7, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 50% 100%, rgba(255, 212, 0, 0.03) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
            z-index: 1;
        }

        .hero-geometric {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
        }

        .hero-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255, 212, 0, 0.15), transparent);
        }

        .hero-line-1 { width: 200%; height: 1px; top: 25%; left: -50%; animation: shimmerLine 8s infinite; }
        .hero-line-2 { width: 200%; height: 1px; top: 50%; left: -50%; animation: shimmerLine 10s infinite 1s; }
        .hero-line-3 { width: 200%; height: 1px; top: 75%; left: -50%; animation: shimmerLine 12s infinite 2s; }

        .hero-v-line {
            position: absolute;
            width: 1px;
            height: 200%;
            background: linear-gradient(180deg, transparent, rgba(255, 212, 0, 0.1), transparent);
        }

        .hero-v-line-1 { left: 15%; top: -50%; animation: shimmerLine 15s infinite 3s; }
        .hero-v-line-2 { left: 85%; top: -50%; animation: shimmerLine 15s infinite 5s; }

        .floating-shape {
            position: absolute;
            z-index: 2;
            border: 2px solid rgba(255, 212, 0, 0.3);
            animation: floatShape1 20s infinite ease-in-out;
        }

        .shape-circle-1 { width: 100px; height: 100px; border-radius: 50%; top: 15%; left: 10%; }
        .shape-circle-2 { width: 60px; height: 60px; border-radius: 50%; bottom: 20%; right: 15%; animation: floatShape2 25s infinite ease-in-out; }
        .shape-square { width: 80px; height: 80px; top: 50%; right: 10%; animation: rotateShape 30s infinite linear; border-radius: 8px; }
        .shape-diamond { width: 70px; height: 70px; top: 40%; left: 5%; animation: floatShape1 22s infinite ease-in-out; transform: rotate(45deg); }

        .accent-line {
            position: absolute;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            z-index: 2;
        }

        .accent-line-1 { width: 300px; height: 2px; top: 30%; left: -100px; animation: slideInLeft 2s ease-out; }
        .accent-line-2 { width: 300px; height: 2px; bottom: 30%; right: -100px; animation: slideInRight 2s ease-out 0.3s both; }

            position: relative;
            z-index: 10;
            max-width: 900px;
            padding: 40px 20px;
            animation: fadeInUp 1s ease-out;
        }
