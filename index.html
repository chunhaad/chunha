    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #FFD400;
            --primary-light: #FFC107;
            --secondary: #111111;
            --secondary-light: #1a1a1a;
            --accent: #FFD400;
            --text-light: #ffffff;
            --text-dark: #111111;
            --border: #e2e8f0;
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: #fff;
            overflow-x: hidden;
        }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--secondary) 0%, var(--secondary-light) 100%);
            color: white;
            padding: 15px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); }
        nav { display: flex; gap: 30px; }
        nav a { color: white; text-decoration: none; font-size: 14px; font-weight: 500; }

        /* HERO */
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: #111;
            color: white;
            padding-top: 60px;
        }
        .hero h1 { font-size: 48px; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }
        .hero p { font-size: 18px; margin-bottom: 40px; color: #ccc; }
        .btn {
            padding: 15px 35px;
            background: var(--primary);
            color: var(--secondary);
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            margin: 10px;
            display: inline-block;
        }

        /* PORTFOLIO */
        .section { padding: 80px 8%; }
        .section-title { text-align: center; margin-bottom: 50px; font-size: 32px; }
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .portfolio-item {
            position: relative;
            height: 300px;
            background: #eee;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid var(--primary);
        }
        .portfolio-item img { width: 100%; height: 100%; object-fit: cover; }
        .portfolio-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: 0.3s;
        }
        .portfolio-item:hover .portfolio-overlay { opacity: 1; }

        /* CONTACT */
        #contact { background: #f9f9f9; }
        .contact-content { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .contact-info div { margin-bottom: 20px; }
        .contact-info h4 { color: var(--primary); margin-bottom: 5px; }

        /* FOOTER */
        footer { background: #000; color: #888; padding: 40px 8%; text-align: center; }

        @media (max-width: 768px) {
            .contact-content { grid-template-columns: 1fr; }
            .hero h1 { font-size: 30px; }
        }
    </style>
</head>
